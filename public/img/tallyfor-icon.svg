<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Tallyfor icon — abstract dragonfly/figure in coral circle -->
  <circle cx="60" cy="60" r="56" fill="#E06B6B"/>

  <!-- Center vertical line (body) -->
  <line x1="60" y1="28" x2="60" y2="92" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Top wings — spread outward -->
  <line x1="60" y1="42" x2="30" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="60" y1="42" x2="90" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Lower wings — wider spread -->
  <line x1="60" y1="52" x2="22" y2="88" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="60" y1="52" x2="98" y2="88" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Head dot -->
  <rect x="56" y="28" width="8" height="8" rx="1.5" fill="white"/>
</svg>
